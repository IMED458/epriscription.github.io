<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/clinic-logo.png" />
    <link rel="apple-touch-icon" href="/assets/clinic-logo.png" />
    <title>კლინიკის მართვის სისტემა</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var isGithubPages = window.location.hostname.endsWith("github.io");
        var alreadyInDist = /\/dist\/?$/.test(window.location.pathname);
        if (isGithubPages && !alreadyInDist) {
          var nextUrl = new URL("./dist/", window.location.href);
          window.location.replace(nextUrl.toString());
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
