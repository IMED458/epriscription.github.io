    <script>
      (function () {
        var isGithubPages = window.location.hostname.endsWith("github.io");
        var alreadyInDist = /\/dist\/?$/.test(window.location.pathname);
        if (isGithubPages && !alreadyInDist) {
          var nextUrl = new URL("./dist/", window.location.href);

      })();
